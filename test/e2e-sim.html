<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>某某笔记 - 全场集锦</title>
<style>
  body { margin: 0; background: #1a1a1c; font-family: sans-serif; }
  /* 复刻小红书 explore 页结构：全屏深色蒙层 + transform 居中的模态 + 嵌套播放器容器 */
  .backdrop { position: fixed; inset: 0; background: rgba(10, 10, 12, 0.94); z-index: 50; }
  .modal { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
           width: 80%; height: 88%; background: #111; border-radius: 12px; display: flex; overflow: hidden; }
  .player { width: 62%; background: #000; position: relative; overflow: hidden; }
  .video-wrap { position: absolute; inset: 0; transform: translateZ(0); will-change: transform; }
  video { width: 100%; height: 100%; object-fit: contain; }
  .controls { position: absolute; left: 0; right: 0; bottom: 0; height: 44px;
              background: linear-gradient(transparent, rgba(0,0,0,.7)); color: #fff;
              display: flex; align-items: center; padding: 0 14px; font-size: 12px; z-index: 3; }
  .comments { flex: 1; color: #ddd; padding: 18px; font-size: 13px; line-height: 2.2; }
</style>
</head>
<body>
<div id="app">
  <div class="backdrop">
    <div class="modal">
      <div class="player">
        <div class="video-wrap">
          <video autoplay muted playsinline></video>
          <div class="controls">⏸ 00:41 / 08:45 · 4K 高帧率</div>
        </div>
      </div>
      <div class="comments">
        <b>全场集锦 · 墨西哥 2-3 英格兰</b><br/>
        网友A：贝林已经坐稳历史第一中场了<br/>
        网友B：裁判是真的怕墨西哥黑帮<br/>
        网友C：控场能力强，双方都没有冲突
      </div>
    </div>
  </div>
</div>
<script>
// chrome API 垫片：让真正的 content scripts 在普通页面里跑起来
// 用 window.__moyuDispatch(msg) 模拟 popup 发消息
window.chrome = window.chrome || {};
chrome.runtime = chrome.runtime || {
  onMessage: {
    addListener(fn) {
      window.__moyuDispatch = (msg) => { let out; fn(msg, null, (r) => (out = r)); return out; };
    },
  },
};
// canvas 假球赛流
const canvas = document.createElement('canvas');
canvas.width = 1280; canvas.height = 720;
const ctx = canvas.getContext('2d');
let t = 0;
(function draw() {
  t += 0.016;
  for (let i = 0; i < 8; i++) { ctx.fillStyle = i % 2 ? '#2e7d32' : '#388e3c'; ctx.fillRect(i * 160, 0, 160, 720); }
  ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(640, 0); ctx.lineTo(640, 720); ctx.stroke();
  ctx.beginPath(); ctx.arc(640, 360, 90, 0, Math.PI * 2); ctx.stroke();
  const x = 640 + Math.sin(t * 0.9) * 420, y = 360 + Math.cos(t * 1.7) * 200;
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,.7)'; ctx.fillRect(40, 30, 260, 54);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif';
  ctx.fillText("MEX 2 : 3 ENG  90'", 56, 66);
  requestAnimationFrame(draw);
})();
document.querySelector('video').srcObject = canvas.captureStream(30);
</script>
<script src="../content/skins/skin-course.js"></script>
<script src="../content/skins/skin-meeting.js"></script>
<script src="../content/skins/skin-editor.js"></script>
<script src="../content/disguise.js"></script>
<script src="../content/filter.js"></script>
<script src="../content/injector.js"></script>
</body>
</html>
