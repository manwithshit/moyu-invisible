<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>🫥 摸鱼隐身衣</h1>
    <span id="status" class="status">未启用</span>
  </header>

  <section class="card">
    <h2>换皮模式</h2>
    <div class="skins">
      <button class="skin" data-skin="course">
        <span class="ico" style="background:#e8f1ff;color:#1e6fff">学</span>
        <span class="nm">在线课程</span>
      </button>
      <button class="skin" data-skin="meeting">
        <span class="ico" style="background:#e7f0ff;color:#3370ff">会</span>
        <span class="nm">视频会议</span>
      </button>
      <button class="skin" data-skin="editor">
        <span class="ico" style="background:#e6f7f7;color:#0aa8a8">剪</span>
        <span class="nm">视频剪辑</span>
      </button>
    </div>
    <div class="filters">
      <label>饱和度 <span id="satVal">0.30</span>
        <input type="range" id="sat" min="0" max="100" value="30" />
      </label>
      <label>亮度 <span id="briVal">0.90</span>
        <input type="range" id="bri" min="70" max="100" value="90" />
      </label>
      <div class="presets">
        <button data-preset="gray">全灰</button>
        <button data-preset="low">低饱和</button>
        <button data-preset="off">关闭滤镜</button>
      </div>
    </div>
  </section>

  <section class="card">
    <h2>小窗看球</h2>
    <button id="popwin" class="wide primary">一键缩到角落小窗</button>
    <p class="tip">小窗内鼠标移到底部：调滤镜 / 还原大窗</p>
  </section>

  <p class="boss">老板键 <kbd>⌃Ctrl + M</kbd>：隐藏并静音，再按恢复（小窗同样有效）</p>

  <button id="restore" class="wide danger">一键还原页面</button>
  <p class="hint" id="hint"></p>

  <script src="popup.js"></script>
</body>
</html>
